<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise Forecast App</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="card">
        
        <header class="app-header">
            <i class="fa-solid fa-cloud-sun-rain app-logo"></i>
            <h1>WeatherWise</h1>
            <p class="tagline">Real-time updates & location-based forecasts</p>
        </header>
        
        <div class="search-box">
            <div class="input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="cityInput" placeholder="Enter city name (e.g., Tamale, Kumasi)..." autocomplete="off">
            </div>
            <button id="loadBtn">Get Forecast</button>
        </div>
        
        <main id="weatherDisplay">
            <div class="welcome-slate">
                <i class="fa-solid fa-location-crosshairs placeholder-icon"></i>
                <p>Enter a city above to plan your day with confidence.</p>
            </div>
        </main>
        
        <div id="errorMsg" class="glass-card error-box" style="display: none;">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>
            <span class="error-text"></span>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
